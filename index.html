<!DOCTYPE html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#f3b86d" />
        <title>Dolly 手機主畫面</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="icon" href="assets/icon.png" type="image/png" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
        />
    </head>
    <body>
        <main class="phone-home">
            <header class="home-hero">
                <p class="home-date" id="today-text">今天也很可愛</p>
                <h1>🌼 我的手機主畫面</h1>
                <p>一鍵進入我們的回憶和小遊戲</p>
            </header>

            <section class="app-grid" aria-label="主要入口">
                <a class="app-card birthday" href="birthday.html">
                    <span class="icon">🎂</span>
                    <span class="title">Birthday</span>
                    <span class="desc">三週年回憶站</span>
                </a>
                <a class="app-card cat" href="cat.html">
                    <span class="icon">🐱</span>
                    <span class="title">Cat World</span>
                    <span class="desc">歐哩 & 大咪樂園</span>
                </a>
            </section>

            <section class="quick-tool" aria-labelledby="quick-title">
                <h2 id="quick-title">🛒 快速比價小工具</h2>
                <p>輸入關鍵字，選平台後一鍵打開搜尋</p>
                <div class="search-row">
                    <input type="text" id="keyword" placeholder="輸入商品關鍵字..." />
                    <button type="button" id="compare-btn">Go</button>
                </div>
                <div class="checkbox-group">
                    <label><input type="checkbox" class="platform" value="shopee" checked />蝦皮</label>
                    <label><input type="checkbox" class="platform" value="momo" checked />momo</label>
                    <label><input type="checkbox" class="platform" value="ruten" checked />露天</label>
                </div>
            </section>

            <footer class="home-tip">
                📱 小提醒：你可以把這頁「加入主畫面」，之後就像 App 一樣直接打開。
            </footer>
        </main>

        <script>
            function updateTodayText() {
                const now = new Date();
                const text = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, "0")}/${String(now.getDate()).padStart(2, "0")} · Dolly Home`;
                document.getElementById("today-text").textContent = text;
            }

            function openLinks() {
                const keyword = document.getElementById("keyword").value.trim();
                if (!keyword) {
                    alert("請輸入商品名稱！");
                    return;
                }

                const encoded = encodeURIComponent(keyword);
                const selected = Array.from(document.querySelectorAll(".platform:checked")).map((cb) => cb.value);

                if (selected.length === 0) {
                    alert("請至少選擇一個平台！");
                    return;
                }

                const urls = {
                    shopee: `https://shopee.tw/search?keyword=${encoded}`,
                    momo: `https://m.momoshop.com.tw/mosearch/${encoded}.html`,
                    ruten: `https://find.ruten.com.tw/s/?q=${encoded}`,
                };

                selected.forEach((platform) => {
                    window.open(urls[platform], "_blank");
                });
            }

            document.getElementById("compare-btn").addEventListener("click", openLinks);
            updateTodayText();
        </script>
    </body>
</html>
